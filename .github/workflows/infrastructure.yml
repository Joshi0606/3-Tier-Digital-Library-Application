# ============================================================
# infrastructure.yml  —  Pipeline 1: Terraform Infrastructure
#
# Auth: GitHub OIDC — no stored AWS keys anywhere.
# AWS issues temporary credentials per job run via OIDC trust.
#
# Required GitHub Variables (repo Settings → Variables):
#   AWS_ROLE_ARN_INFRA → terraform output github_actions_infra_role_arn
#
# No secrets needed.
# ============================================================

name: Infrastructure — Terraform

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"

  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"

  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

# OIDC requires these permissions on the job
permissions:
  id-token: write   # allows GitHub to request OIDC token
  contents: read
  pull-requests: write

env:
  TF_VERSION:  "1.10.0"
  AWS_REGION:  "us-east-1"
  EKS_CLUSTER: "digital-library-prod-eks"

jobs:
  # ── Plan: runs on PRs ──────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_INFRA }}
          aws-region:     ${{ env.AWS_REGION }}
          # Token is valid for 1 hour — enough for any Terraform plan
          role-duration-seconds: 3600

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            const body = `### Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format   | \`${{ steps.fmt.outcome }}\` |
            | Init     | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | Plan     | \`${{ steps.plan.outcome }}\` |

            <details><summary>Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Apply: runs on push to main ───────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_INFRA }}
          aws-region:     ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Setup kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install / upgrade ALB Load Balancer Controller
        run: |
          VPC_ID=$(terraform output -raw vpc_id)
          ALB_ROLE_ARN=$(terraform output -raw alb_controller_role_arn)

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ env.EKS_CLUSTER }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId=$VPC_ID \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$ALB_ROLE_ARN" \
            --set replicaCount=2 \
            --wait --timeout=300s

      - name: Verify ALB Controller is running
        run: |
          kubectl rollout status deployment/aws-load-balancer-controller \
            -n kube-system --timeout=120s
