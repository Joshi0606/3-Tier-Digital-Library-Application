# ============================================================
# ci-cd.yml  —  Pipeline 2: Build → ECR → Deploy to EKS
#
# Auth: GitHub OIDC — no stored AWS keys anywhere.
#
# Required GitHub Variables (repo Settings → Variables):
#   AWS_ROLE_ARN_CICD → terraform output github_actions_cicd_role_arn
#
# Optional GitHub Secrets:
#   TEAMS_WEBHOOK_URL  → Teams notifications (skip if not using Teams)
#
# No AWS access keys needed.
# ============================================================

name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "k8s/**"

  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token request
  contents: read

env:
  AWS_REGION:    "us-east-1"
  ECR_REGISTRY:  "393323650493.dkr.ecr.us-east-1.amazonaws.com"
  EKS_CLUSTER:   "digital-library-prod-eks"
  K8S_NAMESPACE: "library"
  SNS_TOPIC_ARN: "arn:aws:sns:us-east-1:393323650493:digital-library-prod-alerts"

jobs:
  # ── Job 1: Test ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/auth/requirements.txt
          pip install -r app/book/requirements.txt
          pip install -r app/borrow/requirements.txt
          pip install -r app/worker/requirements.txt

      - name: Run tests
        run: echo "Add pytest commands here when tests exist"

  # ── Job 2: Build and Push to ECR ──────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - service:   auth
            context:   ./app/auth
            image:     digital-library-auth
            container: auth-service
          - service:   book
            context:   ./app/book
            image:     digital-library-book
            container: book-service
          - service:   borrow
            context:   ./app/borrow
            image:     digital-library-borrow
            container: borrow-service
          - service:   frontend
            context:   ./app/frontend
            image:     digital-library-frontend
            container: frontend
          - service:   worker
            context:   ./app/worker
            image:     digital-library-worker
            container: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_CICD }}
          aws-region:     ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.image }}:cache
          cache-to:   type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.image }}:cache,mode=max

      - name: Trivy vulnerability scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.ECR_REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          format:         table
          exit-code:      "0"
          ignore-unfixed: true
          severity:       CRITICAL,HIGH

  # ── Job 3: Deploy to EKS ──────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_CICD }}
          aws-region:     ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/cloudwatch-daemonset-observability.yaml

      - name: Apply service manifests
        run: |
          kubectl apply -f k8s/auth-deployment.yaml
          kubectl apply -f k8s/book-deployment.yaml
          kubectl apply -f k8s/borrow-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Pin image tags to git SHA
        run: |
          kubectl set image deployment/auth-deployment \
            auth-service=${{ env.ECR_REGISTRY }}/digital-library-auth:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/book-deployment \
            book-service=${{ env.ECR_REGISTRY }}/digital-library-book:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/borrow-deployment \
            borrow-service=${{ env.ECR_REGISTRY }}/digital-library-borrow:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/frontend-deployment \
            frontend=${{ env.ECR_REGISTRY }}/digital-library-frontend:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/worker-deployment \
            worker=${{ env.ECR_REGISTRY }}/digital-library-worker:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          for dep in auth-deployment book-deployment borrow-deployment frontend-deployment worker-deployment; do
            echo "Waiting for $dep..."
            kubectl rollout status deployment/$dep \
              -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          done

      - name: Smoke test health endpoints
        run: |
          ALB_DNS=$(kubectl get ingress library-ingress \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB DNS: $ALB_DNS"
          for i in 1 2 3 4 5; do
            curl -sf http://$ALB_DNS/auth/health   && \
            curl -sf http://$ALB_DNS/books/health  && \
            curl -sf http://$ALB_DNS/borrow/health && \
            echo "All health checks passed" && break
            echo "Not ready yet, waiting 15s..."
            sleep 15
          done

      - name: Notify SNS — success
        if: success()
        continue-on-error: true
        run: |
          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "✅ Deployment Successful — Digital Library" \
            --message "Commit: ${{ github.sha }} by ${{ github.actor }}" \
            --region ${{ env.AWS_REGION }}

      - name: Notify SNS — failed
        if: failure()
        continue-on-error: true
        run: |
          aws sns publish \
            --topic-arn "${{ env.SNS_TOPIC_ARN }}" \
            --subject "❌ Deployment FAILED — Digital Library" \
            --message "Commit: ${{ github.sha }} — Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }}

      - name: Notify Teams — success
        if: success() && vars.TEAMS_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "themeColor": "00c853",
              "summary": "Deployment Successful",
              "sections": [{
                "activityTitle": "✅ Deployment Successful — Digital Library",
                "facts": [
                  {"name": "Cluster", "value": "${{ env.EKS_CLUSTER }}"},
                  {"name": "Commit",  "value": "${{ github.sha }}"},
                  {"name": "Author",  "value": "${{ github.actor }}"}
                ]
              }]
            }' "${{ vars.TEAMS_WEBHOOK_URL }}"

      - name: Notify Teams — failed
        if: failure() && vars.TEAMS_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "themeColor": "d32f2f",
              "summary": "Deployment Failed",
              "sections": [{
                "activityTitle": "❌ Deployment FAILED — Digital Library",
                "facts": [
                  {"name": "Cluster", "value": "${{ env.EKS_CLUSTER }}"},
                  {"name": "Commit",  "value": "${{ github.sha }}"},
                  {"name": "Author",  "value": "${{ github.actor }}"}
                ]
              }]
            }' "${{ vars.TEAMS_WEBHOOK_URL }}"
