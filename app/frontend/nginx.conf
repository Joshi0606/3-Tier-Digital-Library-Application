# ============================================================
# nginx.conf
#
# LOCAL (docker-compose):
#   upstream names match docker-compose service names:
#   auth → port 5001, book → port 5002, borrow → port 5003
#
# PRODUCTION (EKS):
#   Replace upstream server values with your ALB DNS name
#   or Kubernetes ClusterIP service names.
#
# Why proxy through Nginx?
#   The React app makes calls to /auth/*, /books/*, /borrow/*.
#   Nginx forwards them to the right backend. No CORS issues,
#   no hardcoded backend URLs in the React bundle.
# ============================================================

upstream auth_backend {
    server auth-service:5001;
}

upstream book_backend {
    server book-service:5002;
}

upstream borrow_backend {
    server borrow-service:5003;
}

server {
    listen 80;
    server_name _;

    # Serve React build output
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check ─────────────────────────────────────
    # ALB and docker-compose both use this to verify the
    # container is alive. Returns 200 instantly, no logging.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Auth Service proxy ────────────────────────────────
    # Handles: /auth/signup, /auth/signin, /auth/health
    location /auth/ {
        proxy_pass         http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Book Service proxy ────────────────────────────────
    # Handles: /books, /books/<id>, /books/health
    location /books {
        proxy_pass         http://book_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Borrow Service proxy ──────────────────────────────
    # Handles: /borrow, /borrow/mybooks/<id>, /borrow/health
    location /borrow {
        proxy_pass         http://borrow_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── React SPA — catch all ─────────────────────────────
    # Any URL not matched above returns index.html so React
    # Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;

        # Hashed JS/CSS filenames → safe to cache 1 year
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    application/xml text/xml;
}
