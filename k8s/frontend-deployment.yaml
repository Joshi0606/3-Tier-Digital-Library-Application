apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: library
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend                # was missing in old manifest — caused apply failure
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 393323650493.dkr.ecr.us-east-1.amazonaws.com/digital-library-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: library
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
