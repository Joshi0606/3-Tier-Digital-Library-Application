# hpa.yaml
# Horizontal Pod Autoscaler for the 3 backend services.
# Requires metrics-server — install before applying:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# Worker is excluded — single consumer is correct for SQS (no HPA needed).
# Frontend is excluded — static Nginx, not CPU-bound.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-hpa
  namespace: library
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
